<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Edu Report</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-box">
        <h2>Đăng ký tài khoản</h2>
        <form id="registerForm">
            <div class="role-toggle">
                <input type="radio" id="regStudent" name="reg-role" value="student" checked>
                <label for="regStudent">Sinh viên</label>
                <input type="radio" id="regTeacher" name="reg-role" value="teacher">
                <label for="regTeacher">Giáo viên</label>
            </div>
            <div class="input-group"><label>Họ và tên</label><input type="text" id="reg-name" required></div>
            <div class="input-group"><label>Email</label><input type="email" id="reg-email" required></div>
            <div class="input-group"><label>Mật khẩu</label><input type="password" id="reg-password" required></div>
            <div class="input-group"><label>Xác nhận mật khẩu</label><input type="password" id="reg-confirm" required></div>
            <button type="submit" class="btn-primary">Đăng ký</button>
        </form>
        <p class="auth-link">Đã có tài khoản? <a href="index.html">Đăng nhập ngay</a></p>
    </div>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
