<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Edu Report</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo mb-20">
                    <h2 class="mb-10">Edu Report</h2>
                    <p class="text-muted text-sm">Giáo vụ / Admin</p>
                </div>
                <nav class="menu">
                    <ul>
                        <li class="menu-item active" data-target="admin-classes"><a href="#">Điều phối Lớp học</a></li>
                        <li class="menu-item" data-target="admin-users"><a href="#">Quản lý Tài khoản</a></li>
                    </ul>
                </nav>
            </div>
            <div>
                <p class="user-name font-bold"></p>
                <button onclick="handleLogout()" class="btn-logout">Đăng xuất</button>
            </div>
        </aside>

        <main class="main-content">
            <section id="admin-classes" class="tab-section" style="display:block;">
                <header class="top-header">
                    <h1>Điều phối Lớp học & Buổi học</h1>
                </header>
                
                <div class="border-box mb-20">
                    <h3 class="mb-20">Khởi tạo lớp học mới</h3>
                    <form id="adminCreateClassForm">
                        <div class="flex-row">
                            <div class="input-group flex-1">
                                <label>Môn học</label>
                                <select name="subId" required></select>
                            </div>
                            <div class="input-group flex-1">
                                <label>Giáo viên</label>
                                <select name="teacherId" required></select>
                            </div>
                            <div class="input-group flex-1">
                                <label>Phòng</label>
                                <input type="text" name="room" required>
                            </div>
                            <div class="input-group flex-1">
                                <label>Thứ</label>
                                <select name="dayOfWeek">
                                    <option>Thứ 2</option>
                                    <option>Thứ 3</option>
                                    <option>Thứ 4</option>
                                    <option>Thứ 5</option>
                                    <option>Thứ 6</option>
                                    <option>Thứ 7</option>
                                    <option>Chủ nhật</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex-row align-end">
                            <div class="input-group flex-1">
                                <label>Từ ngày</label>
                                <input type="date" name="startDate" required>
                            </div>
                            <div class="input-group flex-1">
                                <label>Đến ngày</label>
                                <input type="date" name="endDate" required>
                            </div>
                            <div class="input-group flex-1">
                                <label>Tiết BĐ</label>
                                <input type="number" name="startPeriod" min="1" max="12" required>
                            </div>
                            <div class="input-group flex-1">
                                <label>Tiết KT</label>
                                <input type="number" name="endPeriod" min="1" max="12" required>
                            </div>
                            <div class="input-group">
                                <button type="submit" class="btn-primary" style="padding: 10px 20px;">Tạo Lớp</button>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div id="adminClassList" class="border-box"></div>
            </section>

            <section id="admin-class-detail" class="tab-section">
                <button onclick="document.querySelector('[data-target=\'admin-classes\']').click();" class="action-btn mb-20">← Quay lại</button>
                <header class="top-header">
                    <h1 id="admDetailClassName"></h1>
                </header>
                
                <div class="sub-menu">
                    <button data-target="adm-sub-students" class="sub-btn active" onclick="adminRenderStudents()">Sinh viên</button>
                    <button data-target="adm-sub-sessions" class="sub-btn" onclick="adminRenderSessions()">Buổi học</button>
                </div>
                
                <div id="adm-sub-students" class="sub-tab-content">
                    <div class="flex-row mb-20">
                        <input type="text" id="addStuId" placeholder="Mã Sinh viên" style="padding:10px; border:1px solid #ccc; width: 250px; border-radius: 4px;">
                        <button class="btn-primary" style="width:auto;" onclick="adminAddStudentToClass()">+ Thêm Sinh viên</button>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Mã SV</th>
                                <th>Họ tên</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="admStudentList"></tbody>
                    </table>
                </div>
                
                <div id="adm-sub-sessions" class="sub-tab-content border-box" style="display:none;">
                    <div class="mb-20">
                        <h3 class="mb-10">Tạo buổi học bổ sung</h3>
                        <form id="adminCreateSessionForm" class="flex-row align-end">
                            <div class="input-group flex-1 mb-0">
                                <label>Ngày</label>
                                <input type="date" name="sesDate" required>
                            </div>
                            <div class="input-group flex-1 mb-0">
                                <label>Tiết BĐ</label>
                                <input type="number" name="sesStart" min="1" max="12" required>
                            </div>
                            <div class="input-group flex-1 mb-0">
                                <label>Tiết KT</label>
                                <input type="number" name="sesEnd" min="1" max="12" required>
                            </div>
                            <div class="input-group mb-0">
                                <button type="submit" class="btn-primary" style="padding: 10px 15px;">+ Tạo buổi</button>
                            </div>
                        </form>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Ngày học</th>
                                <th>Tiết học</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="admSessionList"></tbody>
                    </table>
                </div>
            </section>

            <section id="admin-users" class="tab-section border-box">
                <header class="top-header">
                    <h1>Danh sách Hệ thống</h1>
                </header>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Vai trò</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="adminUsersList"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="admEditClassModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('editClassForm').reset();">&times;</span>
            <h2 class="mb-20">Sửa Thông Tin Lớp Học</h2>
            
            <form id="editClassForm">
                <input type="hidden" name="classId">
                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Môn học</label>
                        <select name="subId" required></select>
                    </div>
                    <div class="input-group flex-1">
                        <label>Giáo viên</label>
                        <select name="teacherId" required></select>
                    </div>
                </div>
                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Phòng học</label>
                        <input type="text" name="room" required>
                    </div>
                    <div class="input-group flex-1">
                        <label>Thứ</label>
                        <select name="dayOfWeek">
                            <option>Thứ 2</option>
                            <option>Thứ 3</option>
                            <option>Thứ 4</option>
                            <option>Thứ 5</option>
                            <option>Thứ 6</option>
                            <option>Thứ 7</option>
                            <option>Chủ nhật</option>
                        </select>
                    </div>
                </div>
                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Từ ngày</label>
                        <input type="date" name="startDate" required>
                    </div>
                    <div class="input-group flex-1">
                        <label>Đến ngày</label>
                        <input type="date" name="endDate" required>
                    </div>
                </div>
                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Tiết BĐ</label>
                        <input type="number" name="startPeriod" min="1" max="12" required>
                    </div>
                    <div class="input-group flex-1">
                        <label>Tiết KT</label>
                        <input type="number" name="endPeriod" min="1" max="12" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary mt-10">Lưu thay đổi & Làm mới Lịch học</button>
            </form>
        </div>
    </div>
    
    <div id="admEditSessionModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('editSessionForm').reset();">&times;</span>
            <h2 class="mb-20">Sửa Buổi Học</h2>
            
            <form id="editSessionForm">
                <input type="hidden" name="sessionId">
                <div class="input-group">
                    <label>Ngày học</label>
                    <input type="date" name="sesDate" required>
                </div>
                <div class="flex-row">
                    <div class="input-group flex-1">
                        <label>Tiết BĐ</label>
                        <input type="number" name="sesStart" min="1" max="12" required>
                    </div>
                    <div class="input-group flex-1">
                        <label>Tiết KT</label>
                        <input type="number" name="sesEnd" min="1" max="12" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Cập nhật Buổi học</button>
            </form>
        </div>
    </div>
    
    <script src="js/db.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
