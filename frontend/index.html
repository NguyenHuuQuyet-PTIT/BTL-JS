<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Edu Report - Đăng nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-box">
        <h2 class="text-center mb-10">EDU REPORT</h2>
        <p class="text-muted text-sm text-center mb-20">Hệ thống quản lý giảng dạy & học tập</p>
        <h3 class="text-center mb-20 text-primary">Đăng nhập Hệ thống</h3>

        <!-- FORM ĐĂNG NHẬP -->
        <form id="loginForm" autocomplete="off">
            <div class="role-toggle" style="justify-content: space-around; margin-bottom: 20px;">
                <input type="radio" id="loginRoleStudent" name="loginRole" value="sinh-vien" checked>
                <label for="loginRoleStudent">Sinh viên</label>
                
                <input type="radio" id="loginRoleTeacher" name="loginRole" value="giang-vien">
                <label for="loginRoleTeacher">Giảng viên</label>

                <input type="radio" id="loginRoleAdmin" name="loginRole" value="admin">
                <label for="loginRoleAdmin">Quản trị viên</label>
            </div>
            
            <div class="input-group">
                <label>Email hoặc Tên đăng nhập</label>
                <input type="text" name="email" required placeholder="Nhập tên đăng nhập hoặc email..." autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" required placeholder="Nhập mật khẩu..." autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn-primary mt-10">Đăng nhập</button>
            
            <div class="border-box mt-20 p-10 bg-light">
                <p class="text-sm font-bold text-primary mb-10 text-center">Tài khoản demo:</p>
                <div class="flex-row justify-between text-sm flex-wrap" style="gap: 5px; flex-direction: column;">
                    <span><strong>SV:</strong> sinhvien (Mật khẩu: sinhvien)</span>
                    <span><strong>GV:</strong> giaovien (Mật khẩu: giaovien)</span>
                    <span><strong>Admin:</strong> admin (Mật khẩu: admin)</span>
                </div>
            </div>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
