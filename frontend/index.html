<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Edu Report - Đăng nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <!-- Nền trang trí -->
    <div class="animated-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
    </div>

    <div class="auth-box">
        <!-- Header Logo và tiêu đề -->
        <div class="auth-header">
            <h1>EDU REPORT</h1>
            <p>Hệ thống quản lý giảng dạy và học tập</p>
        </div>

        <!-- Biểu mẫu đăng nhập -->
        <form id="loginForm" autocomplete="off">
            <!-- Bộ chọn vai trò dạng trượt (SaaS Segment Control) -->
            <div class="role-select-container">
                <input type="radio" id="loginRoleStudent" name="loginRole" value="sinh-vien" checked>
                <input type="radio" id="loginRoleTeacher" name="loginRole" value="giang-vien">
                <input type="radio" id="loginRoleAdmin" name="loginRole" value="admin">
                
                <span class="role-slider"></span>
                
                <label for="loginRoleStudent" class="role-label">Sinh viên</label>
                <label for="loginRoleTeacher" class="role-label">Giảng viên</label>
                <label for="loginRoleAdmin" class="role-label">Quản trị viên</label>
            </div>
            
            <!-- Trường nhập tên đăng nhập -->
            <div class="input-group">
                <label>Email hoặc Mã định danh</label>
                <input type="text" name="email" required placeholder="Nhập email hoặc mã ID của bạn..." autocomplete="off">
            </div>
            
            <!-- Trường nhập mật khẩu -->
            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" required placeholder="Nhập mật khẩu của bạn..." autocomplete="new-password">
            </div>
            
            <!-- Nút nhấn submit đăng nhập -->
            <button type="submit" class="btn-submit">Đăng nhập</button>
            
            <!-- Bảng thông tin tài khoản demo ghim kính mờ -->
            <div class="demo-accounts-board">
                <div class="demo-title">Tài khoản thử nghiệm</div>
                <div class="demo-accounts-list">
                    <div class="demo-item">
                        <span>Sinh viên</span>
                        <strong>sinhvien</strong>
                    </div>
                    <div class="demo-item">
                        <span>Giảng viên</span>
                        <strong>giaovien</strong>
                    </div>
                    <div class="demo-item">
                        <span>Quản trị viên</span>
                        <strong>admin</strong>
                    </div>
                </div>
            </div>

            <!-- Khối liên kết ủng hộ dự án hiển thị mã QR tài trợ -->
            <div style="text-align: center; margin-top: 15px; border-top: 1px dashed rgba(139, 61, 255, 0.1); padding-top: 15px;">
                <a href="#" onclick="hienThiModalUngHo(); return false;" style="color: var(--text-muted); font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 5px; opacity: 0.8; transition: opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
                    <span style="color: #ff453a;">💖</span> <span style="text-decoration: underline; font-weight: 500;">Ủng hộ dự án</span>
                </a>
            </div>
        </form>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
