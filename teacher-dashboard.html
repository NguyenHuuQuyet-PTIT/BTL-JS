<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Giáo viên - Edu Report</title><link rel="stylesheet" href="css/style.css"></head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top"><div class="logo"><h2>Edu Report</h2><p>Giáo viên</p></div><nav class="menu"><ul><li class="menu-item active" data-target="class-tab"><a href="#">Lớp học của tôi</a></li><li class="menu-item" data-target="profile-tab"><a href="#">Thông tin cá nhân</a></li></ul></nav></div>
            <div><p class="user-name" style="font-weight:bold;"></p><button onclick="handleLogout()" class="btn-logout">[→ Đăng xuất</button></div>
        </aside>
        <main class="main-content">
            <section id="class-tab" class="tab-section active-tab"><header class="top-header"><h1>Các lớp đang phụ trách</h1></header><div id="teacherClassList" class="charts-container"></div></section>
            
            <section id="class-detail-tab" class="tab-section">
                <button onclick="document.getElementById('class-tab').classList.add('active-tab'); this.parentElement.classList.remove('active-tab');" class="action-btn" style="margin-bottom:15px; border:none; background:none;">← Quay lại danh sách lớp</button>
                <header class="top-header"><h1 id="teacherDetailClassName"></h1><p id="teacherDetailClassInfo"></p></header>
                <div class="sub-menu"><button onclick="switchTeacherSubTab('grades')" id="tc-tab-grades-btn" class="active">Nhập Điểm</button><button onclick="switchTeacherSubTab('sessions')" id="tc-tab-sessions-btn">Điểm danh</button></div>
                <div id="tc-sub-grades"><table class="data-table"><thead><tr><th>Sinh viên</th><th>CC</th><th>GK</th><th>CK</th><th>TB</th><th>Hành động</th></tr></thead><tbody id="tcStudentGrades"></tbody></table></div>
                <div id="tc-sub-sessions" style="display:none;"><div id="tcSessionList" class="charts-container"></div><div id="tcAttendanceView" style="display:none; margin-top:30px; border-top:2px solid #000; padding-top:20px;"><h3 id="tcAttSessionInfo" style="margin-bottom:15px;"></h3><table class="data-table"><thead><tr><th>Sinh viên</th><th>Trạng thái</th></tr></thead><tbody id="tcAttendanceList"></tbody></table><button class="btn-primary" style="margin-top:20px; width:auto;" onclick="teacherSaveAttendance()">Lưu bảng điểm danh</button></div></div>
            </section>

            <section id="profile-tab" class="tab-section">
                <header class="top-header"><h1>Hồ sơ cá nhân</h1></header>
                <div class="profile-card">
                    <div class="avatar-placeholder"></div>
                    <div><p><strong>Mã GV:</strong> <span id="tcProfId"></span></p><p><strong>Họ tên:</strong> <span class="user-name"></span></p><p><strong>Email:</strong> <span class="user-email"></span></p><p><strong>Ngày sinh:</strong> <span id="tcProfDob"></span></p><p><strong>SĐT:</strong> <span id="tcProfPhone"></span></p><button id="btnShowEditProfileTc" class="btn-primary" style="margin-top:15px; width:auto; padding: 8px 15px;">Chỉnh sửa hồ sơ</button></div>
                </div>
                <div id="editProfileFormContainerTc" style="display:none; max-width:400px; background:#fff; padding:20px; border:1px solid #ddd; border-radius:8px;">
                    <h3 style="margin-bottom: 15px;">Cập nhật thông tin</h3>
                    <form id="editProfileFormTc"><div class="input-group"><label>Mật khẩu mới</label><input type="password" id="editPassTc" placeholder="Bỏ trống nếu không đổi"></div><div class="input-group"><label>SĐT</label><input type="text" id="editPhoneTc"></div><div class="input-group"><label>Ngày sinh</label><input type="date" id="editDobTc"></div><div style="display:flex; gap:10px;"><button type="submit" class="btn-primary">Lưu</button><button type="button" id="btnCancelEditProfileTc" class="btn-logout" style="margin-top:0;">Hủy</button></div></form>
                </div>
            </section>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
